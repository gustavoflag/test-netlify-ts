<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeScript REST API on Netlify</title>
</head>
<body>
  <h1>Welcome to the TypeScript REST API</h1>
  <p>This is a serverless REST API deployed on Netlify.</p>
  <p>API endpoints:</p>
  <ul>
    <li>GET /api/items</li>
    <li>GET /api/items/:id</li>
    <li>POST /api/items</li>
    <li>PUT /api/items/:id</li>
    <li>DELETE /api/items/:id</li>
  </ul>
</body>
</html>
